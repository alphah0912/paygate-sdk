name: CI - Java

on:
  push:
    paths:
      - 'java/src/**'
      - 'spec/**'
      - 'build.gradle'
      - '.github/workflows/ci-java.yml'
  pull_request:
    paths:
      - 'java/src/**'
      - 'spec/**'
      - 'build.gradle'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - run: ./gradlew test
